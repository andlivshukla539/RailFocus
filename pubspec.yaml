# pubspec.yaml
# ============
name: railfocus

description: "A train journey themed focus and productivity timer app."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  audioplayers: ^6.6.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_animate: ^4.5.2
  go_router: ^15.1.2
  google_fonts: ^6.2.1
  flutter_displaymode: ^0.7.0
  flutter_local_notifications: ^20.1.0
  timezone: ^0.10.1
  shared_preferences: ^2.5.4
  wakelock_plus: ^1.4.0
  permission_handler: ^12.0.1
  flutter_native_splash: ^2.4.7

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.14.3

# ═══════════════════════════════════════════════════════════════
# APP ICON CONFIGURATION (Top-level — NOT inside dev_dependencies)
# Run: dart run flutter_launcher_icons
# ═══════════════════════════════════════════════════════════════
flutter_launcher_icons:
  android: true
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#07090F"
  adaptive_icon_foreground: "assets/icon/icon.png"
  min_sdk_android: 21
  ios: true
  remove_alpha_ios: true

# ═══════════════════════════════════════════════════════════════
# NATIVE SPLASH SCREEN CONFIGURATION (Top-level — separate section)
# Run: dart run flutter_native_splash:create
# ═════════════════════════════════════════════��═════════════════
flutter_native_splash:
  color: "#07090F"
  image: "assets/icon/splash_logo.png"
  android_12:
    color: "#07090F"
    icon_background_color: "#07090F"
    image: "assets/icon/splash_logo.png"
  ios: true
  fullscreen: true

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/Sleep.mp3
    - assets/sounds/train_ambient.mp3
    - assets/sounds/whistle.mp3
    - assets/sounds/click.mp3
    - assets/sounds/arrival_bell.mp3
    - assets/sounds/ticket_stamp.mp3
    - assets/icon/icon.png
    - assets/icon/splash_logo.png